name: Build unsigned iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Write .env
        # Значения берутся из Repository variables (Settings → Secrets and
        # variables → Actions → Variables) — задайте там EXPO_PUBLIC_SUPABASE_URL
        # и EXPO_PUBLIC_SUPABASE_ANON_KEY перед первым запуском. Они не хранятся
        # в репозитории.
        env:
          SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Задайте Repository variables EXPO_PUBLIC_SUPABASE_URL и EXPO_PUBLIC_SUPABASE_ANON_KEY (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          echo "EXPO_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env

      - name: Write Sentry DSN (optional)
        # Не обязателен для сборки — если переменная не задана, приложение
        # просто соберётся без крэш-мониторинга.
        env:
          SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            echo "EXPO_PUBLIC_SENTRY_DSN=$SENTRY_DSN" >> .env
          fi

      - name: Expo prebuild (iOS)
        # --non-interactive не поддерживается CLI — используем CI=1.
        run: CI=1 npx expo prebuild --platform ios

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Detect workspace and scheme
        # Схема должна совпадать с именем главного .xcodeproj (не Pods) —
        # просто "первая строка из списка схем" ловит внутренние Pod-схемы
        # (EXApplication и т.п.), если та оказывается раньше по алфавиту.
        working-directory: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          echo "Workspace: $WORKSPACE"
          PROJECT=$(ls -d *.xcodeproj | grep -v '^Pods\.xcodeproj$' | head -n1)
          SCHEME_NAME=$(basename "$PROJECT" .xcodeproj)
          echo "Expected scheme (from project name): $SCHEME_NAME"

          AVAILABLE_SCHEMES=$(xcodebuild -workspace "$WORKSPACE" -list \
            | awk '/Schemes:/{flag=1;next} /^ *$/{if (flag) exit} flag{print}' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          echo "Available schemes:"
          echo "$AVAILABLE_SCHEMES"

          if echo "$AVAILABLE_SCHEMES" | grep -qx "$SCHEME_NAME"; then
            SCHEME="$SCHEME_NAME"
          else
            echo "Схема '$SCHEME_NAME' не найдена среди доступных" >&2
            exit 1
          fi
          echo "Scheme: $SCHEME"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"

      - name: Build (unsigned)
        # xcodebuild archive без подписи часто не кладёт .app в
        # Products/Applications (архивация — операция для подписанных
        # сборок). Поэтому просто билдим в явную папку и берём .app оттуда,
        # без архива вообще.
        working-directory: ios
        run: |
          set -euo pipefail
          mkdir -p ../build/Products
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath ../build/DerivedData \
            CONFIGURATION_BUILD_DIR=../build/Products \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Products -maxdepth 1 -name "*.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo ".app не найден в build/Products" >&2
            find build -maxdepth 3 >&2
            exit 1
          fi
          echo "App: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r -y App.ipa Payload
          ls -la App.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ipa
          path: build/App.ipa
          if-no-files-found: error
