name: Build unsigned iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Write .env
        # –ó–Ω–∞—á–µ–Ω–∏—è –±–µ—Ä—É—Ç—Å—è –∏–∑ Repository variables (Settings ‚Üí Secrets and
        # variables ‚Üí Actions ‚Üí Variables) ‚Äî –∑–∞–¥–∞–π—Ç–µ —Ç–∞–º EXPO_PUBLIC_SUPABASE_URL
        # –∏ EXPO_PUBLIC_SUPABASE_ANON_KEY –ø–µ—Ä–µ–¥ –ø–µ—Ä–≤—ã–º –∑–∞–ø—É—Å–∫–æ–º. –û–Ω–∏ –Ω–µ —Ö—Ä–∞–Ω—è—Ç—Å—è
        # –≤ —Ä–µ–ø–æ–∑–∏—Ç–æ—Ä–∏–∏.
        env:
          SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::–ó–∞–¥–∞–π—Ç–µ Repository variables EXPO_PUBLIC_SUPABASE_URL –∏ EXPO_PUBLIC_SUPABASE_ANON_KEY (Settings ‚Üí Secrets and variables ‚Üí Actions ‚Üí Variables)"
            exit 1
          fi
          echo "EXPO_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env

      - name: Write Sentry DSN (optional)
        # –ù–µ –æ–±—è–∑–∞—Ç–µ–ª–µ–Ω –¥–ª—è —Å–±–æ—Ä–∫–∏ ‚Äî –µ—Å–ª–∏ –ø–µ—Ä–µ–º–µ–Ω–Ω–∞—è –Ω–µ –∑–∞–¥–∞–Ω–∞, –ø—Ä–∏–ª–æ–∂–µ–Ω–∏–µ
        # –ø—Ä–æ—Å—Ç–æ —Å–æ–±–µ—Ä—ë—Ç—Å—è –±–µ–∑ –∫—Ä—ç—à-–º–æ–Ω–∏—Ç–æ—Ä–∏–Ω–≥–∞.
        env:
          SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            echo "EXPO_PUBLIC_SENTRY_DSN=$SENTRY_DSN" >> .env
          fi

      - name: Expo prebuild (iOS)
        # --non-interactive –Ω–µ –ø–æ–¥–¥–µ—Ä–∂–∏–≤–∞–µ—Ç—Å—è CLI ‚Äî –∏—Å–ø–æ–ª—å–∑—É–µ–º CI=1.
        run: CI=1 npx expo prebuild --platform ios

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Detect workspace and scheme
        working-directory: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          echo "Workspace: $WORKSPACE"
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list \
            | awk '/Schemes:/{flag=1;next} /^ *$/{if (flag) exit} flag{print}' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | head -n1)
          echo "Scheme: $SCHEME"
          if [ -z "$WORKSPACE" ] || [ -z "$SCHEME" ]; then
            echo "–ù–µ —É–¥–∞–ª–æ—Å—å –æ–ø—Ä–µ–¥–µ–ª–∏—Ç—å workspace/scheme" >&2
            exit 1
          fi
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"

      - name: Build (unsigned)
        # xcodebuild archive –±–µ–∑ –ø–æ–¥–ø–∏—Å–∏ —á–∞—Å—Ç–æ –Ω–µ –∫–ª–∞–¥—ë—Ç .app –≤
        # Products/Applications (–∞—Ä—Ö–∏–≤–∞—Ü–∏—è ‚Äî –æ–ø–µ—Ä–∞—Ü–∏—è –¥–ª—è –ø–æ–¥–ø–∏—Å–∞–Ω–Ω—ã—Ö
        # —Å–±–æ—Ä–æ–∫). –ü–æ—ç—Ç–æ–º—É –ø—Ä–æ—Å—Ç–æ –±–∏–ª–¥–∏–º –≤ —è–≤–Ω—É—é –ø–∞–ø–∫—É –∏ –±–µ—Ä—ë–º .app –æ—Ç—Ç—É–¥–∞,
        # –±–µ–∑ –∞—Ä—Ö–∏–≤–∞ –≤–æ–æ–±—â–µ.
        working-directory: ios
        run: |
          set -euo pipefail
          mkdir -p ../build/Products
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath ../build/DerivedData \
            CONFIGURATION_BUILD_DIR=../build/Products \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Products -maxdepth 1 -name "*.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo ".app –Ω–µ –Ω–∞–π–¥–µ–Ω –≤ build/Products" >&2
            find build -maxdepth 3 >&2
            exit 1
          fi
          echo "App: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r -y App.ipa Payload
          ls -la App.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ipa
          path: build/App.ipa
          if-no-files-found: error
